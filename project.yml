name: ios-agent-app
options:
  bundleIdPrefix: com.ios-agent-app
  deploymentTarget:
    iOS: "16.0"

packages:
  Neon:
    url: https://github.com/ChimeHQ/Neon.git
    from: 0.5.0
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: 0.3.0

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: minimal
    TARGETED_DEVICE_FAMILY: "1,2"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    ENABLE_BITCODE: NO

targets:
  ios-agent-app:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        buildPhase: resources
    dependencies:
      - package: Neon
        product: Neon
      - package: swift-markdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ios-agent-app.app
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ENABLE_BITCODE: NO
        OTHER_SWIFT_FLAGS: "$(inherited) -strict-concurrency=minimal"
