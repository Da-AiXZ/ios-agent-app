disabled_rules:
  - trailing_whitespace
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - closure_spacing
  - collection_alignment
  - conditional_returns_on_newline
  - contains_over_first_not_nil
  - fatal_error_message
  - first_where
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - unused_import
  - yoda_condition

analyzer_rules:
  - explicit_self
  - unused_declaration
  - unused_import

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - url
    - x
    - y

nesting:
  type_level: 2

trailing_comma:
  mandatory_comma: true

modifier_order:
  preferred_modifier_order:
    - acl
    - override
    - final
    - static
    - convenience
    - required
    - mutating
    - lazy

included:
  - Sources

excluded:
  - .build
  - DerivedData
