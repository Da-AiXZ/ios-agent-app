name: Build iOS IPA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build and Package IPA
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --quiet

      - name: Build for iOS (unsigned)
        run: |
          set -o pipefail
          xcodebuild \
            -project ios-agent-app.xcodeproj \
            -scheme ios-agent-app \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      - name: Run tests in Simulator
        id: test
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios-agent-app.xcodeproj \
            -scheme ios-agent-app \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resultBundlePath test-results.xcresult || echo "Tests completed with failures (non-blocking)"

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find DerivedData -name "ios-agent-app.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Could not find ios-agent-app.app in DerivedData"
            find DerivedData -name "*.app" || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r ios-agent-app.ipa Payload/
          rm -rf Payload
          echo "IPA created: ios-agent-app.ipa"
          ls -lh ios-agent-app.ipa

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: ios-agent-app.ipa
          prerelease: true
          generate_release_notes: true
